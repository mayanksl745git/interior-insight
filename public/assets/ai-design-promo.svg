<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9F1C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFBF69;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3A506B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1C2541;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#grad2)"/>
  
  <!-- AI Brain/Network Visualization -->
  <circle cx="200" cy="200" r="100" fill="none" stroke="#FF9F1C" stroke-width="2" opacity="0.7" />
  <circle cx="200" cy="200" r="70" fill="none" stroke="#FF9F1C" stroke-width="2" opacity="0.7" />
  <circle cx="200" cy="200" r="40" fill="none" stroke="#FF9F1C" stroke-width="2" opacity="0.7" />
  
  <!-- Nodes -->
  <circle cx="200" cy="100" r="8" fill="#FF9F1C" />
  <circle cx="300" cy="200" r="8" fill="#FF9F1C" />
  <circle cx="200" cy="300" r="8" fill="#FF9F1C" />
  <circle cx="100" cy="200" r="8" fill="#FF9F1C" />
  <circle cx="250" cy="150" r="8" fill="#FF9F1C" />
  <circle cx="250" cy="250" r="8" fill="#FF9F1C" />
  <circle cx="150" cy="250" r="8" fill="#FF9F1C" />
  <circle cx="150" cy="150" r="8" fill="#FF9F1C" />
  <circle cx="200" cy="200" r="12" fill="#FF9F1C" />
  
  <!-- Connections -->
  <line x1="200" y1="100" x2="200" y2="200" stroke="#FF9F1C" stroke-width="2" opacity="0.7" />
  <line x1="300" y1="200" x2="200" y2="200" stroke="#FF9F1C" stroke-width="2" opacity="0.7" />
  <line x1="200" y1="300" x2="200" y2="200" stroke="#FF9F1C" stroke-width="2" opacity="0.7" />
  <line x1="100" y1="200" x2="200" y2="200" stroke="#FF9F1C" stroke-width="2" opacity="0.7" />
  <line x1="250" y1="150" x2="200" y2="200" stroke="#FF9F1C" stroke-width="2" opacity="0.7" />
  <line x1="250" y1="250" x2="200" y2="200" stroke="#FF9F1C" stroke-width="2" opacity="0.7" />
  <line x1="150" y1="250" x2="200" y2="200" stroke="#FF9F1C" stroke-width="2" opacity="0.7" />
  <line x1="150" y1="150" x2="200" y2="200" stroke="#FF9F1C" stroke-width="2" opacity="0.7" />
  
  <!-- Room Transformation Visualization -->
  <rect x="400" y="100" width="300" height="200" fill="#FFFFFF" opacity="0.1" rx="5" ry="5" />
  
  <!-- Before Room (Sketch) -->
  <rect x="420" y="120" width="120" height="160" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="5,5" opacity="0.7" />
  <line x1="420" y1="200" x2="540" y2="200" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="5,5" opacity="0.7" />
  <rect x1="450" y1="220" x2="510" y2="280" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="5,5" opacity="0.7" />
  <rect x1="430" y1="150" x2="470" y2="190" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="5,5" opacity="0.7" />
  
  <!-- Arrow -->
  <line x1="560" y1="200" x2="580" y2="200" stroke="#FF9F1C" stroke-width="3" />
  <polygon points="580,200 570,195 570,205" fill="#FF9F1C" />
  
  <!-- After Room (Polished) -->
  <rect x="600" y="120" width="120" height="160" fill="none" stroke="#FF9F1C" stroke-width="2" opacity="0.9" />
  <line x1="600" y1="200" x2="720" y2="200" stroke="#FF9F1C" stroke-width="2" opacity="0.9" />
  <rect x="630" y="220" width="60" height="60" fill="none" stroke="#FF9F1C" stroke-width="2" opacity="0.9" rx="2" ry="2" />
  <rect x="610" y="150" width="40" height="40" fill="none" stroke="#FF9F1C" stroke-width="2" opacity="0.9" />
  <circle cx="700" cy="160" r="15" fill="none" stroke="#FF9F1C" stroke-width="2" opacity="0.9" />
  
  <text x="400" y="350" font-family="Arial" font-size="24" text-anchor="start" fill="#FFFFFF">Transform Your Space with AI</text>
</svg>