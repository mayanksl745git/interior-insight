<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F5F5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#grad1)"/>
  
  <!-- Floor -->
  <rect x="0" y="450" width="800" height="150" fill="#E0E0E0" />
  
  <!-- Bathtub -->
  <rect x="500" y="300" width="250" height="150" fill="#FFFFFF" stroke="#EEEEEE" stroke-width="3" rx="10" ry="10" />
  <rect x="500" y="440" width="250" height="10" fill="#EEEEEE" />
  <circle cx="700" cy="320" r="10" fill="#BDBDBD" />
  
  <!-- Sink -->
  <rect x="100" y="350" width="150" height="50" fill="#FFFFFF" stroke="#EEEEEE" stroke-width="3" />
  <circle cx="175" cy="375" r="15" fill="#FAFAFA" stroke="#EEEEEE" stroke-width="2" />
  <rect x="100" y="400" width="150" height="50" fill="#FAFAFA" stroke="#EEEEEE" stroke-width="2" />
  
  <!-- Mirror -->
  <rect x="100" y="200" width="150" height="100" fill="#E3F2FD" stroke="#BBDEFB" stroke-width="5" />
  
  <!-- Toilet -->
  <rect x="300" y="380" width="80" height="70" fill="#FFFFFF" stroke="#EEEEEE" stroke-width="2" rx="5" ry="5" />
  <rect x="310" y="350" width="60" height="30" fill="#FFFFFF" stroke="#EEEEEE" stroke-width="2" rx="5" ry="5" />
  <ellipse cx="340" cy="350" rx="30" ry="10" fill="#FFFFFF" stroke="#EEEEEE" stroke-width="2" />
  
  <!-- Towel Rack -->
  <rect x="400" y="200" width="10" height="100" fill="#BDBDBD" />
  <rect x="410" y="220" width="50" height="60" fill="#90CAF9" opacity="0.8" />
  
  <!-- Plants -->
  <rect x="50" y="400" width="30" height="50" fill="#BDBDBD" rx="2" ry="2" />
  <ellipse cx="65" cy="380" rx="20" ry="30" fill="#81C784" />
  
  <text x="400" y="550" font-family="Arial" font-size="24" text-anchor="middle" fill="#757575">Minimalist Bathroom</text>
</svg>