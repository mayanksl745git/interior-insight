<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E0E0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#grad1)"/>
  
  <!-- Floor -->
  <rect x="50" y="400" width="700" height="150" fill="#FAFAFA" />
  
  <!-- Wall Art -->
  <rect x="200" y="100" width="400" height="200" fill="#FFFFFF" stroke="#EEEEEE" stroke-width="5" />
  <line x1="250" y1="150" x2="550" y2="150" stroke="#BDBDBD" stroke-width="2" />
  <line x1="250" y1="200" x2="550" y2="200" stroke="#BDBDBD" stroke-width="2" />
  <line x1="250" y1="250" x2="550" y2="250" stroke="#BDBDBD" stroke-width="2" />
  
  <!-- Sofa -->
  <rect x="150" y="450" width="300" height="80" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="2" rx="5" ry="5" />
  <rect x="150" y="430" width="300" height="20" fill="#EEEEEE" stroke="#E0E0E0" stroke-width="2" rx="5" ry="5" />
  
  <!-- Coffee Table -->
  <ellipse cx="500" cy="490" rx="100" ry="40" fill="#FFFFFF" stroke="#EEEEEE" stroke-width="2" />
  
  <!-- Plant -->
  <rect x="650" y="350" width="50" height="100" fill="#EEEEEE" rx="5" ry="5" />
  <ellipse cx="675" cy="320" rx="40" ry="50" fill="#81C784" />
  
  <!-- Window -->
  <rect x="50" y="150" width="100" height="200" fill="#E3F2FD" stroke="#BBDEFB" stroke-width="5" />
  <line x1="100" y1="150" x2="100" y2="350" stroke="#BBDEFB" stroke-width="5" />
  
  <text x="400" y="550" font-family="Arial" font-size="24" text-anchor="middle" fill="#757575">Scandinavian Living Room</text>
</svg>