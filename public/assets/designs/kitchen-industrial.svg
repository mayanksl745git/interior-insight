<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#424242;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#212121;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#grad1)"/>
  
  <!-- Floor -->
  <rect x="0" y="450" width="800" height="150" fill="#616161" />
  
  <!-- Kitchen Island -->
  <rect x="250" y="400" width="300" height="100" fill="#757575" stroke="#9E9E9E" stroke-width="2" />
  <rect x="250" y="380" width="300" height="20" fill="#BDBDBD" stroke="#9E9E9E" stroke-width="2" />
  
  <!-- Cabinets -->
  <rect x="50" y="300" width="700" height="100" fill="#424242" stroke="#616161" stroke-width="2" />
  <rect x="100" y="320" width="80" height="60" fill="#616161" stroke="#757575" stroke-width="2" />
  <rect x="220" y="320" width="80" height="60" fill="#616161" stroke="#757575" stroke-width="2" />
  <rect x="340" y="320" width="80" height="60" fill="#616161" stroke="#757575" stroke-width="2" />
  <rect x="460" y="320" width="80" height="60" fill="#616161" stroke="#757575" stroke-width="2" />
  <rect x="580" y="320" width="80" height="60" fill="#616161" stroke="#757575" stroke-width="2" />
  
  <!-- Upper Cabinets -->
  <rect x="50" y="100" width="700" height="80" fill="#424242" stroke="#616161" stroke-width="2" />
  
  <!-- Hanging Lights -->
  <line x1="300" y1="100" x2="300" y2="300" stroke="#9E9E9E" stroke-width="2" />
  <circle cx="300" cy="320" r="20" fill="#FFC107" opacity="0.8" />
  
  <line x1="400" y1="100" x2="400" y2="300" stroke="#9E9E9E" stroke-width="2" />
  <circle cx="400" cy="320" r="20" fill="#FFC107" opacity="0.8" />
  
  <line x1="500" y1="100" x2="500" y2="300" stroke="#9E9E9E" stroke-width="2" />
  <circle cx="500" cy="320" r="20" fill="#FFC107" opacity="0.8" />
  
  <!-- Exposed Brick -->
  <rect x="50" y="180" width="700" height="120" fill="#A1887F" />
  <line x1="100" y1="180" x2="100" y2="300" stroke="#8D6E63" stroke-width="2" />
  <line x1="150" y1="180" x2="150" y2="300" stroke="#8D6E63" stroke-width="2" />
  <line x1="200" y1="180" x2="200" y2="300" stroke="#8D6E63" stroke-width="2" />
  <line x1="250" y1="180" x2="250" y2="300" stroke="#8D6E63" stroke-width="2" />
  <line x1="300" y1="180" x2="300" y2="300" stroke="#8D6E63" stroke-width="2" />
  <line x1="350" y1="180" x2="350" y2="300" stroke="#8D6E63" stroke-width="2" />
  <line x1="400" y1="180" x2="400" y2="300" stroke="#8D6E63" stroke-width="2" />
  <line x1="450" y1="180" x2="450" y2="300" stroke="#8D6E63" stroke-width="2" />
  <line x1="500" y1="180" x2="500" y2="300" stroke="#8D6E63" stroke-width="2" />
  <line x1="550" y1="180" x2="550" y2="300" stroke="#8D6E63" stroke-width="2" />
  <line x1="600" y1="180" x2="600" y2="300" stroke="#8D6E63" stroke-width="2" />
  <line x1="650" y1="180" x2="650" y2="300" stroke="#8D6E63" stroke-width="2" />
  <line x1="700" y1="180" x2="700" y2="300" stroke="#8D6E63" stroke-width="2" />
  
  <line x1="50" y1="210" x2="750" y2="210" stroke="#8D6E63" stroke-width="2" />
  <line x1="50" y1="240" x2="750" y2="240" stroke="#8D6E63" stroke-width="2" />
  <line x1="50" y1="270" x2="750" y2="270" stroke="#8D6E63" stroke-width="2" />
  
  <text x="400" y="550" font-family="Arial" font-size="24" text-anchor="middle" fill="#E0E0E0">Industrial Kitchen</text>
</svg>