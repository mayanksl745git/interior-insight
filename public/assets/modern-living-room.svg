<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <rect width="1920" height="1080" fill="url(#paint0_linear)"/>
  
  <!-- Room elements -->
  <rect x="200" y="200" width="1520" height="680" fill="#F5F5F5" opacity="0.9"/>
  <rect x="200" y="200" width="1520" height="80" fill="#E0E0E0"/>
  
  <!-- Windows -->
  <rect x="300" y="250" width="400" height="500" fill="#B2EBF2" opacity="0.7"/>
  <rect x="800" y="250" width="400" height="500" fill="#B2EBF2" opacity="0.7"/>
  
  <!-- Furniture -->
  <rect x="400" y="600" width="300" height="100" fill="#795548" rx="10"/> <!-- Sofa -->
  <rect x="800" y="600" width="200" height="200" fill="#8D6E63" rx="5"/> <!-- Coffee table -->
  <rect x="1100" y="500" width="150" height="300" fill="#A1887F"/> <!-- Bookshelf -->
  
  <!-- Decorative elements -->
  <circle cx="900" cy="400" r="50" fill="#FFB74D" opacity="0.8"/> <!-- Pendant light -->
  <rect x="500" y="300" width="100" height="150" fill="#90A4AE" opacity="0.6"/> <!-- Art piece -->
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ECEFF1"/>
      <stop offset="1" stop-color="#CFD8DC"/>
    </linearGradient>
  </defs>
</svg>